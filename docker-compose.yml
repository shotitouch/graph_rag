services:
  backend:
    build:
      context: ./server
    env_file:
      - ./server/.env
    environment:
      PERSIST_DIR: /app/chroma_db
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  chroma_data:
